<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SVG Images for Download - Educational Resources">
    <title>Images to Download</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f5;
        }

        /* Banner */
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Main Content */
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Grid Layout */
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        /* Card Styling */
        .image-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .image-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        /* Image Container */
        .image-preview {
            width: 100%;
            height: 200px;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 2px solid #f0f0f0;
        }

        .image-preview img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* Card Content */
        .card-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-content h3 {
            color: #667eea;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        .card-content p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        /* Download Button */
        .download-btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: opacity 0.3s ease;
            text-align: center;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .download-btn:hover {
            opacity: 0.9;
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: #999;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
        }

        footer p {
            margin: 0;
            font-size: 0.95rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            header p {
                font-size: 0.95rem;
            }

            .images-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 1.5rem;
            }

            main {
                padding: 0 1rem;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.5rem;
            }

            .images-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Banner -->
    <header>
        <h1>Images to Download</h1>
        <p>Educational Resources for Your Workshops</p>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Mother's Day Section -->
        <section style="margin-bottom: 3rem;">
            <h2 style="margin-bottom: 1rem; color: #764ba2;">Mother's Day Gift Box</h2>
            
            <div class="images-grid">
                <div class="image-card">
                    <div class="image-preview">
                        <img src="cover_template.png" alt="cover template">
                    </div>
                    <div class="card-content">
                        <h3>Cover Template</h3>
                        <a href="cover_template.png" download="cover_template.png" class="download-btn">
                            ⬇️ Download PNG
                        </a>
                    </div>
                </div>
                <div class="image-card">
                    <div class="image-preview">
                        <img src="side_panel_complete.png" alt="side panel">
                    </div>
                    <div class="card-content">
                        <h3>Side Panel</h3>
                        <a href="side_panel_complete.png" download="side_panel_complete.png" class="download-btn">
                            ⬇️ Download PNG
                        </a>
                    </div>
                </div>
            </div>
        </section>
         <h2 style="margin-bottom: 1rem; color: #764ba2;">Make a 3D Button</h2>
        <section class="images-grid" id="imagesGrid">
            <!-- Image cards will be inserted here -->
            <div class="empty-state">
                <p>No images available yet. Check back soon!</p>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Christine Al-Thifairy. All rights reserved.</p>
    </footer>

    <script>
        // Image data - modify this array to add your SVG images
        const images = [
            {
                title: "fleur-de-lis",
                filename: "fleur-de-lis.svg",
                thumbnail: "fleur-de-lis.svg" // path to SVG file
            },
            {
                title: "Turtle",
                filename: "turtle.svg",
                thumbnail: "turtle.svg"
            },
            {
                title: "Starfish",
                filename: "starfish.svg",
                thumbnail: "starfish.svg"
            },
            // Add more images here
            {
                title: "Tulip",
                filename: "tulip.svg",
                thumbnail: "tulip.svg"
            },
            {
                title: "Spiral celtic knot",
                filename: "spiral-celtic-knot2.svg",
                thumbnail: "spiral-celtic-knot2.svg"
            },
            {
                title: "celtic knot",
                filename: "celtic knot.svg",
                thumbnail: "celtic knot.svg"
            },
            {
                title: "Heart",
                filename: "heart.svg",
                thumbnail: "heart.svg"
            },
            {
                title: "Simple flower",
                filename: "simple-flower.svg",
                thumbnail: "simple-flower.svg"
            },
            {
                title: "Flower",
                filename: "simple-flower2.svg",
                thumbnail: "simple-flower2.svg"
            },
            {
                title: "Flower 2",
                filename: "simple-flower3.svg",
                thumbnail: "simple-flower3.svg"
            },
            {
                title: "Spiral celtic knot",
                filename: "spiral-celtic-knot.svg",
                thumbnail: "spiral-celtic-knot.svg"
            },
            {
                title: "Swirl",
                filename: "swirl.svg",
                thumbnail: "swirl.svg"
            },
            {
                title: "Wreath - leaves 1",
                filename: "leaf-wreath.svg",
                thumbnail: "leaf-wreath.svg"
            },
            {
                title: "Wreath - leaves 2",
                filename: "leaves-wreath2.svg",
                thumbnail: "leaves-wreath2.svg"
            },
            {
                title: "Wreath - leaves 3",
                filename: "leaf-wreath3.svg",
                thumbnail: "leaf-wreath3.svg"
            },
            {
                title: "Cat face",
                filename: "cat-face.svg",
                thumbnail: "cat-face.svg"
            },
            {
                title: "Cat face 2",
                filename: "cat-with-eye-holes.svg",
                thumbnail: "cat-with-eye-holes.svg"
            },
            {
                title: "Arabesque",
                filename: "arabesque.svg",
                thumbnail: "arabesque.svg"
            }
            
        ];

        // Function to render images
        function renderImages() {
            const grid = document.getElementById('imagesGrid');
            
            if (images.length === 0) {
                grid.innerHTML = '<div class="empty-state"><p>No images available yet. Check back soon!</p></div>';
                return;
            }

            grid.innerHTML = images.map(image => `
                <div class="image-card">
                    <div class="image-preview">
                        <img src="${image.thumbnail}" alt="${image.title}" onerror="this.style.display='none'">
                    </div>
                    <div class="card-content">
                        <h3>${image.title}</h3>
                        <a href="${image.filename}" download="${image.filename}" class="download-btn">
                            ⬇️ Download SVG
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // Render images on page load
        document.addEventListener('DOMContentLoaded', renderImages);
    </script>
</body>
</html>
